# Dynamic LLM routing — @alias message text
#
# Each model needs:
#   alias:    mention trigger (case-insensitive, word characters and hyphens only)
#   base_url: OpenAI-compatible API base URL
#   model:    model identifier (supports / and : e.g. openrouter/auto, gemma4:26b)
#
# For remote providers, add an OneCLI secret matching the base_url hostname:
#   onecli secrets create --name "OpenAI" --type anthropic --value sk-... --host-pattern api.openai.com
#
# Local models (Ollama, LM Studio) need no credentials — use http://host.docker.internal:<port>/v1
#
# Examples:
# models:
#   - alias: llama3
#     base_url: http://host.docker.internal:11434/v1
#     model: llama3:8b
#   - alias: auto
#     base_url: https://openrouter.ai/api/v1
#     model: openrouter/auto
#   - alias: gemma
#     base_url: http://host.docker.internal:11434/v1
#     model: gemma4:26b
models:
  - alias: gemma
    base_url: http://host.docker.internal:11434
    model: gemma4:26b
  - alias: nemo2
    base_url: http://host.docker.internal:11434
    model: nemotron-cascade-2:30b
  - alias: mini3
    base_url: http://host.docker.internal:11434
    model: ministral-3:14b
  - alias: glm4
    base_url: http://host.docker.internal:11434
    model: glm-4.7-flash:q4_K_M
  - alias: dev2
    base_url: http://host.docker.internal:11434
    model: devstral-small-2:24b
  - alias: qwen35
    base_url: http://host.docker.internal:11434
    model: qwen3.5:27b
  - alias: qwen3535
    base_url: http://host.docker.internal:11434
    model: qwen3.5:35b
  - alias: gemmad
    base_url: http://host.docker.internal:11434
    model: gemma4:31b
  - alias: auto
    base_url: https://openrouter.ai/api/v1
    model: openrouter/auto
  - alias: gemini
    base_url: https://openrouter.ai/api/v1
    model: google/gemini-3-flash-preview
